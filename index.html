<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="light dark" />
<title>FindHome AI · 帮你买房</title>
<meta name="description" content="FindHome AI - 懂数据、懂邻里、懂投资的买房助手" />
<!-- No external CDN – markdown renders locally -->
<style>
  /* ============ Design tokens (one accent: jade. light + dark locked) ============ */
  :root{
    --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro SC", "PingFang SC",
      "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    --font-mono: "SF Mono", "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;

    --r-input: 12px; --r-btn: 12px; --r-card: 16px; --r-bubble: 16px; --r-chip: 999px;

    /* persona identity tints (icon backgrounds only - brand accent stays singular) */
    --p-analyst: #3B82F6;
    --p-neighbor: #E08A2B;
    --p-investor: #C99A2E;
    --p-luxury: #0EA5B7;

    --ease: cubic-bezier(.16,1,.3,1);
  }
  html[data-theme="light"]{
    --bg:#F5F7FA; --surface:#FFFFFF; --surface-2:#F0F3F7; --surface-3:#E7ECF2;
    --border:#E3E8EF; --border-strong:#CFD8E3;
    --text:#0F172A; --text-2:#4B5566; --text-3:#94A0B0;
    --accent:#0E9F6E; --accent-2:#0B8A5F; --on-accent:#FFFFFF;
    --accent-soft:rgba(14,159,110,.10); --accent-line:rgba(14,159,110,.28);
    --shadow:0 1px 2px rgba(16,24,40,.04), 0 10px 28px rgba(16,24,40,.07);
    --shadow-sm:0 1px 2px rgba(16,24,40,.05);
    --scrim:rgba(15,23,42,.42);
  }
  html[data-theme="dark"]{
    --bg:#0B0E13; --surface:#12161D; --surface-2:#171C25; --surface-3:#1F2632;
    --border:#242C38; --border-strong:#333D4C;
    --text:#E7ECF3; --text-2:#9CA9BA; --text-3:#647082;
    --accent:#16BC8C; --accent-2:#1DCB98; --on-accent:#04130D;
    --accent-soft:rgba(22,188,140,.14); --accent-line:rgba(22,188,140,.30);
    --shadow:0 1px 2px rgba(0,0,0,.32), 0 14px 34px rgba(0,0,0,.40);
    --shadow-sm:0 1px 2px rgba(0,0,0,.35);
    --scrim:rgba(2,4,8,.62);
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:var(--font-sans); font-size:15px; line-height:1.6;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    overscroll-behavior:none;
  }
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  ::selection{background:var(--accent-soft);}

  /* ============ App shell ============ */
  .app{
    display:flex; flex-direction:column; height:100dvh; max-width:1180px; margin:0 auto;
  }

  /* ---- Topbar ---- */
  .topbar{
    display:flex; align-items:center; gap:18px;
    padding:14px clamp(16px,4vw,28px); height:66px; flex:0 0 auto;
    border-bottom:1px solid var(--border);
    background:color-mix(in srgb, var(--bg) 78%, transparent);
    backdrop-filter:saturate(160%) blur(14px);
    -webkit-backdrop-filter:saturate(160%) blur(14px);
    position:sticky; top:0; z-index:30;
  }
  .brand{display:flex; align-items:center; gap:10px; flex:0 0 auto; user-select:none;}
  .brand-mark{
    width:30px; height:30px; border-radius:9px; flex:0 0 auto;
    background:linear-gradient(150deg, var(--accent), var(--accent-2));
    display:grid; place-items:center; box-shadow:var(--shadow-sm);
  }
  .brand-mark svg{width:18px; height:18px; display:block;}
  .brand-name{font-weight:680; letter-spacing:-.01em; font-size:15.5px;}
  .brand-name span{color:var(--text-3); font-weight:500; margin-left:7px; font-size:13px;}

  /* persona rail */
  .personas{
    display:flex; gap:6px; flex:1 1 auto; min-width:0; overflow-x:auto;
    scrollbar-width:none; -ms-overflow-style:none; padding:2px;
  }
  .personas::-webkit-scrollbar{display:none;}
  .pchip{
    display:flex; align-items:center; gap:8px; flex:0 0 auto;
    padding:6px 12px 6px 6px; border-radius:var(--r-chip);
    border:1px solid var(--border); background:var(--surface);
    color:var(--text-2); font-size:13.5px; font-weight:560;
    transition:border-color .2s var(--ease), background .2s var(--ease), color .2s var(--ease), transform .12s var(--ease);
    white-space:nowrap;
  }
  .pchip:hover{border-color:var(--border-strong); color:var(--text);}
  .pchip:active{transform:scale(.97);}
  .pchip[aria-pressed="true"]{
    border-color:var(--accent-line); background:var(--accent-soft); color:var(--text);
  }
  .pchip .ico{
    width:24px; height:24px; border-radius:7px; display:grid; place-items:center;
    font-size:14px; line-height:1; flex:0 0 auto;
    background:color-mix(in srgb, var(--phue) 22%, var(--surface));
  }
  .pchip[aria-pressed="true"] .ico{background:color-mix(in srgb, var(--phue) 30%, var(--surface));}

  .topbar-actions{display:flex; align-items:center; gap:6px; flex:0 0 auto;}
  .iconbtn{
    width:36px; height:36px; border-radius:10px; display:grid; place-items:center;
    color:var(--text-2); border:1px solid transparent;
    transition:background .18s var(--ease), color .18s var(--ease), border-color .18s var(--ease);
  }
  .iconbtn:hover{background:var(--surface-2); color:var(--text); border-color:var(--border);}
  .iconbtn:active{transform:scale(.94);}
  .iconbtn svg{width:18px; height:18px;}
  .namebtn{
    display:flex; align-items:center; gap:7px; padding:6px 11px 6px 7px; border-radius:var(--r-chip);
    border:1px solid var(--border); background:var(--surface); color:var(--text-2);
    font-size:13px; font-weight:560; transition:border-color .18s var(--ease), color .18s var(--ease);
  }
  .namebtn:hover{border-color:var(--border-strong); color:var(--text);}
  .namebtn .av{
    width:22px; height:22px; border-radius:50%; display:grid; place-items:center; flex:0 0 auto;
    background:linear-gradient(150deg, var(--accent), var(--accent-2)); color:var(--on-accent);
    font-size:11px; font-weight:720;
  }

  /* ---- Thread ---- */
  .thread{
    flex:1 1 auto; overflow-y:auto; padding:26px clamp(16px,4vw,28px) 8px;
    scroll-behavior:smooth;
  }
  .thread::-webkit-scrollbar{width:10px;}
  .thread::-webkit-scrollbar-thumb{background:var(--border-strong); border-radius:99px; border:3px solid var(--bg);}
  .thread::-webkit-scrollbar-track{background:transparent;}
  .stream{display:flex; flex-direction:column; gap:22px; max-width:780px; margin:0 auto; padding-bottom:14px;}

  /* messages */
  .msg{display:flex; gap:13px; animation:rise .45s var(--ease) both;}
  @keyframes rise{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}
  .msg-user{flex-direction:row-reverse;}
  .msg .avatar{
    width:34px; height:34px; border-radius:10px; flex:0 0 auto; display:grid; place-items:center;
    font-size:17px; line-height:1; margin-top:1px;
    background:color-mix(in srgb, var(--phue,var(--accent)) 20%, var(--surface));
    border:1px solid var(--border);
  }
  .msg-user .avatar{
    background:linear-gradient(150deg, var(--accent), var(--accent-2)); color:var(--on-accent);
    font-size:12px; font-weight:720; border:none;
  }
  .col{min-width:0; max-width:88%;}
  .msg-user .col{display:flex; justify-content:flex-end;}
  .bubble-user{
    background:var(--accent); color:var(--on-accent); padding:11px 15px;
    border-radius:var(--r-bubble) var(--r-bubble) 4px var(--r-bubble);
    font-size:14.5px; line-height:1.65; box-shadow:var(--shadow-sm); white-space:pre-wrap; word-break:break-word;
  }

  .bubble{
    background:var(--surface); border:1px solid var(--border); border-radius:4px var(--r-bubble) var(--r-bubble) var(--r-bubble);
    box-shadow:var(--shadow-sm); overflow:hidden;
  }

  /* agent trace (thinking + tools) */
  .trace{border-bottom:1px solid var(--border); background:var(--surface-2);}
  .trace-head{
    display:flex; align-items:center; gap:9px; width:100%; padding:9px 14px;
    color:var(--text-2); font-size:12.5px; font-weight:560; text-align:left;
  }
  .trace-head:hover{color:var(--text);}
  .trace-head .spin{width:13px; height:13px; flex:0 0 auto;}
  .trace-head .chev{margin-left:auto; transition:transform .22s var(--ease); color:var(--text-3);}
  .trace.collapsed .chev{transform:rotate(-90deg);}
  .trace-body{padding:2px 14px 12px; display:flex; flex-direction:column; gap:9px;}
  .trace.collapsed .trace-body{display:none;}

  .think{
    font-size:13px; line-height:1.7; color:var(--text-2);
    padding:8px 12px; border-left:2px solid var(--accent-line);
    background:color-mix(in srgb, var(--accent) 5%, var(--surface)); border-radius:0 8px 8px 0;
    white-space:pre-wrap; word-break:break-word;
  }
  .tool{border:1px solid var(--border); border-radius:10px; background:var(--surface); overflow:hidden;}
  .tool-head{
    display:flex; align-items:center; gap:9px; width:100%; padding:8px 11px; text-align:left;
    font-size:12.5px; color:var(--text);
  }
  .tool-head .tname{font-family:var(--font-mono); font-size:12px; font-weight:600;}
  .tool-head .tlabel{color:var(--text-3);}
  .tool-head .tstat{margin-left:auto; display:flex; align-items:center; gap:6px; color:var(--text-3); font-size:11.5px;}
  .tool-head .chev{transition:transform .22s var(--ease); color:var(--text-3);}
  .tool.collapsed .chev{transform:rotate(-90deg);}
  .tool-body{
    padding:0 12px 11px; font-family:var(--font-mono); font-size:11.5px; line-height:1.65;
    color:var(--text-2); white-space:pre-wrap; word-break:break-word; max-height:260px; overflow:auto;
  }
  .tool.collapsed .tool-body{display:none;}
  .dot-ok{width:14px; height:14px; color:var(--accent);}

  /* final answer markdown */
  .answer{padding:13px 16px 15px; font-size:14.7px; line-height:1.72;}
  .answer.empty{display:none;}
  .answer>:first-child{margin-top:0;} .answer>:last-child{margin-bottom:0;}
  .answer p{margin:.55em 0;}
  .answer h1,.answer h2,.answer h3{line-height:1.35; letter-spacing:-.01em; margin:1.1em 0 .5em; font-weight:660;}
  .answer h1{font-size:1.28em;} .answer h2{font-size:1.15em;} .answer h3{font-size:1.04em;}
  .answer ul,.answer ol{margin:.5em 0; padding-left:1.35em;}
  .answer li{margin:.28em 0;}
  .answer a{color:var(--accent-2); text-decoration:none; border-bottom:1px solid var(--accent-line);}
  .answer a:hover{border-bottom-color:var(--accent);}
  .answer code{font-family:var(--font-mono); font-size:.88em; background:var(--surface-2); padding:.12em .4em; border-radius:6px;}
  .answer pre{background:var(--surface-2); border:1px solid var(--border); padding:12px 14px; border-radius:10px; overflow:auto; margin:.7em 0;}
  .answer pre code{background:none; padding:0; font-size:12.5px; line-height:1.6;}
  .answer blockquote{margin:.7em 0; padding:.2em 0 .2em 14px; border-left:3px solid var(--accent-line); color:var(--text-2);}
  .answer table{border-collapse:collapse; width:100%; margin:.7em 0; font-size:13.5px;}
  .answer th,.answer td{border:1px solid var(--border); padding:7px 11px; text-align:left;}
  .answer th{background:var(--surface-2); font-weight:620;}
  .answer hr{border:none; border-top:1px solid var(--border); margin:1em 0;}
  .answer strong{font-weight:660;}

  /* typing indicator */
  .typing{display:inline-flex; gap:4px; padding:13px 16px;}
  .typing i{width:7px; height:7px; border-radius:50%; background:var(--text-3); animation:bounce 1.3s var(--ease) infinite;}
  .typing i:nth-child(2){animation-delay:.16s;} .typing i:nth-child(3){animation-delay:.32s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0); opacity:.45;} 30%{transform:translateY(-5px); opacity:1;}}

  .errline{
    margin:6px 0 0; padding:10px 13px; border-radius:10px; font-size:13px;
    background:color-mix(in srgb,#E5484D 12%, var(--surface)); color:#E5484D;
    border:1px solid color-mix(in srgb,#E5484D 26%, transparent);
  }
  .spin{display:inline-block; animation:rot .9s linear infinite;}
  @keyframes rot{to{transform:rotate(360deg);}}

  /* ---- Empty state ---- */
  .empty-wrap{max-width:680px; margin:min(8vh,70px) auto 0; text-align:center; padding:0 4px; animation:rise .5s var(--ease) both;}
  .empty-badge{
    display:inline-flex; align-items:center; gap:8px; padding:5px 13px 5px 7px; border-radius:var(--r-chip);
    border:1px solid var(--border); background:var(--surface); color:var(--text-2); font-size:12.5px; font-weight:560; margin-bottom:22px;
  }
  .empty-badge .ico{width:24px; height:24px; border-radius:7px; display:grid; place-items:center; font-size:14px;
    background:color-mix(in srgb,var(--phue) 24%, var(--surface));}
  .empty-wrap h1{font-size:clamp(22px,4.6vw,30px); line-height:1.25; letter-spacing:-.02em; font-weight:700; margin:0 0 12px;}
  .empty-wrap h1 em{font-style:normal; color:var(--accent-2);}
  .empty-wrap .sub{color:var(--text-2); font-size:15px; max-width:46ch; margin:0 auto 30px;}
  .samples{display:grid; grid-template-columns:1fr 1fr; gap:10px; text-align:left;}
  .sample{
    display:flex; align-items:flex-start; gap:10px; padding:13px 15px; border-radius:var(--r-card);
    border:1px solid var(--border); background:var(--surface); color:var(--text);
    font-size:14px; line-height:1.5; transition:border-color .18s var(--ease), transform .14s var(--ease), background .18s var(--ease);
  }
  .sample:hover{border-color:var(--accent-line); background:var(--accent-soft);}
  .sample:active{transform:scale(.985);}
  .sample .k{color:var(--text-3); margin-top:1px; flex:0 0 auto;}
  .sample svg{width:16px; height:16px;}

  /* ---- Composer ---- */
  .composer{flex:0 0 auto; padding:8px clamp(16px,4vw,28px) max(14px,env(safe-area-inset-bottom)); }
  .composer-inner{max-width:780px; margin:0 auto;}
  .modes{display:flex; gap:4px; margin:0 0 9px 2px; padding:3px; background:var(--surface-2); border:1px solid var(--border);
    border-radius:var(--r-chip); width:max-content; max-width:100%;}
  .mode{padding:5px 13px; border-radius:var(--r-chip); font-size:12.5px; font-weight:560; color:var(--text-2);
    transition:color .16s var(--ease), background .16s var(--ease); white-space:nowrap; display:flex; align-items:center; gap:6px;}
  .mode[aria-pressed="true"]{background:var(--surface); color:var(--text); box-shadow:var(--shadow-sm);}
  .mode .mdot{width:6px; height:6px; border-radius:50%; background:var(--text-3);}
  .mode[aria-pressed="true"] .mdot{background:var(--accent);}

  .inputbar{
    display:flex; align-items:flex-end; gap:9px; padding:9px 9px 9px 16px;
    background:var(--surface); border:1px solid var(--border-strong); border-radius:20px;
    box-shadow:var(--shadow); transition:border-color .2s var(--ease), box-shadow .2s var(--ease);
  }
  .inputbar:focus-within{border-color:var(--accent-line); box-shadow:var(--shadow), 0 0 0 4px var(--accent-soft);}
  .inputbar textarea{
    flex:1 1 auto; resize:none; border:none; outline:none; background:none; color:var(--text);
    font-family:inherit; font-size:15px; line-height:1.55; max-height:168px; padding:7px 0; min-height:24px;
  }
  .inputbar textarea::placeholder{color:var(--text-3);}
  .send{
    width:40px; height:40px; flex:0 0 auto; border-radius:13px; display:grid; place-items:center;
    background:var(--accent); color:var(--on-accent); transition:background .18s var(--ease), transform .12s var(--ease), opacity .18s var(--ease);
  }
  .send:hover{background:var(--accent-2);}
  .send:active{transform:scale(.92);}
  .send:disabled{opacity:.4; cursor:not-allowed;}
  .send svg{width:19px; height:19px;}
  .send.stop{background:var(--surface-3); color:var(--text);}
  .hint{margin:8px 4px 0; font-size:11.5px; color:var(--text-3); text-align:center; display:flex; justify-content:center; gap:10px; flex-wrap:wrap;}
  .hint b{color:var(--text-2); font-weight:560;}
  kbd{font-family:var(--font-mono); font-size:10.5px; padding:1px 5px; border-radius:5px; border:1px solid var(--border); background:var(--surface-2); color:var(--text-2);}

  /* ---- Modal (name + settings) ---- */
  .scrim{position:fixed; inset:0; background:var(--scrim); backdrop-filter:blur(3px); z-index:50;
    display:grid; place-items:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .2s var(--ease);}
  .scrim.open{opacity:1; pointer-events:auto;}
  .modal{
    width:100%; max-width:430px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-card);
    box-shadow:var(--shadow); padding:22px; transform:translateY(8px) scale(.99); transition:transform .22s var(--ease);
  }
  .scrim.open .modal{transform:none;}
  .modal h2{margin:0 0 4px; font-size:16.5px; font-weight:680; letter-spacing:-.01em;}
  .modal p.desc{margin:0 0 18px; font-size:13px; color:var(--text-2);}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12.5px; font-weight:560; color:var(--text-2); margin-bottom:6px;}
  .field input{
    width:100%; padding:10px 12px; border-radius:var(--r-input); border:1px solid var(--border-strong);
    background:var(--surface-2); color:var(--text); font-family:inherit; font-size:14px; outline:none;
    transition:border-color .18s var(--ease), box-shadow .18s var(--ease);
  }
  .field input:focus{border-color:var(--accent-line); box-shadow:0 0 0 3px var(--accent-soft);}
  .field .help{font-size:11.5px; color:var(--text-3); margin-top:5px; line-height:1.5;}
  .modal-actions{display:flex; gap:9px; justify-content:flex-end; margin-top:20px;}
  .btn{padding:9px 17px; border-radius:var(--r-btn); font-size:14px; font-weight:580; transition:transform .12s var(--ease), background .18s var(--ease), border-color .18s var(--ease);}
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--accent); color:var(--on-accent);}
  .btn-primary:hover{background:var(--accent-2);}
  .btn-ghost{background:var(--surface-2); color:var(--text-2); border:1px solid var(--border);}
  .btn-ghost:hover{color:var(--text); border-color:var(--border-strong);}
  .seg{display:flex; gap:6px;}
  .seg button{flex:1; padding:8px; border-radius:10px; border:1px solid var(--border); background:var(--surface-2);
    color:var(--text-2); font-size:13px; font-weight:560; transition:all .16s var(--ease);}
  .seg button[aria-pressed="true"]{border-color:var(--accent-line); background:var(--accent-soft); color:var(--text);}

  /* ---- Auth Tabs ---- */
  .auth-tabs{display:flex; gap:0; margin-bottom:18px; border-bottom:2px solid var(--border);}
  .auth-tab{flex:1; padding:9px; background:none; border:none; color:var(--text-3); font-size:14px; font-weight:600; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .15s;}
  .auth-tab:hover{color:var(--text);}
  .auth-tab.active{color:var(--accent); border-bottom-color:var(--accent);}
  .login-err{padding:8px 10px; background:color-mix(in srgb,#E5484D 10%,var(--surface)); border:1px solid color-mix(in srgb,#E5484D 20%,transparent); border-radius:8px; color:#E5484D; font-size:12px; margin-bottom:8px; text-align:center;}

  /* ---- Responsive ---- */
  @media (max-width:680px){
    .brand-name span{display:none;}
    .personas{order:3; flex-basis:100%; overflow-x:auto;}
    .topbar{flex-wrap:wrap; height:auto; gap:10px 14px; padding-top:11px; padding-bottom:11px;}
    .col{max-width:92%;}
    .samples{grid-template-columns:1fr;}
    .empty-wrap{margin-top:28px;}
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; scroll-behavior:auto !important;}
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand" title="FindHome AI">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10v9.5h13V10"/><path d="M10 19.5v-5h4v5"/>
        </svg>
      </div>
      <div class="brand-name">FindHome<span>帮你买房</span></div>
    </div>

    <nav class="personas" id="personas" aria-label="选择助手人格"></nav>

    <div class="topbar-actions">
      <button class="namebtn" id="nameBtn" title="设置你的称呼">
        <span class="av" id="nameAv">你</span><span id="nameLabel">访客</span>
      </button>
      <button class="iconbtn" id="themeBtn" title="切换主题" aria-label="切换深色 / 浅色">

<script>
(() => {
  "use strict";

  // ---------- config ----------
  const ENDPOINTS = {
    primary:  "https://web-j7tgg1ovg-petersu-s-projects.vercel.app/api/chat",
    fallback: "https://web-j7tgg1ovg-petersu-s-projects.vercel.app/api/chat",
  };
  const PERSONAS = [
    { id:"analyst",  emoji:"📊", name:"数据专家",   hue:"var(--p-analyst)",
      tagline:"用数据说话，拆解价格、供需与趋势",
      samples:["杭州未来科技城的房价这两年走势如何？","帮我用数据对比这两个板块的性价比"] },
    { id:"neighbor", emoji:"🏘️", name:"邻里向导",   hue:"var(--p-neighbor)",
      tagline:"带你看真实的社区、配套与生活气息",
      samples:["这个小区适合带娃住吗？周边配套怎么样？","通勤、菜场、学校，帮我看看真实居住体验"] },
    { id:"investor", emoji:"💎", name:"投资猎人",   hue:"var(--p-investor)",
      tagline:"算清回报、风险与退出，只谈真金白银",
      samples:["预算 300 万，哪些城市值得现在进场？","这套房当投资标的，租金回报和风险怎么算？"] },
    { id:"luxury",   emoji:"🏖️", name:"海居生活家", hue:"var(--p-luxury)",
      tagline:"海景、度假与改善型住宅的生活提案",
      samples:["三亚的海景房值不值得买？要注意什么？","想要一套能度假也能养老的海边房子"] },
  ];
  const MODES = [
    { id:"online", name:"联网", desc:"全部工具可用" },
    { id:"think",  name:"深度", desc:"仅内部推理" },
    { id:"normal", name:"对话", desc:"纯聊天无工具" },
  ];

  const LS = "findhome.v2";
  const USERS_KEY = "findhome.users";
  const load = () => { try { return JSON.parse(localStorage.getItem(LS)) || {}; } catch { return {}; } };
  const save = () => { try { localStorage.setItem(LS, JSON.stringify(state)); } catch {} };
  const loadUsers = () => { try { return JSON.parse(localStorage.getItem(USERS_KEY)) || {}; } catch { return {}; } };
  const saveUsers = (u) => { try { localStorage.setItem(USERS_KEY, JSON.stringify(u)); } catch {} };

  const saved = load();
  const state = {
    userName: saved.userName || "",
    account: saved.account || "",
    loggedIn: saved.loggedIn || false,
    persona:  PERSONAS.some(p=>p.id===saved.persona) ? saved.persona : "analyst",
    mode:     MODES.some(m=>m.id===saved.mode) ? saved.mode : "online",
    theme:    saved.theme || (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark"),
    endpointKey: saved.endpointKey || "primary",
    endpoint: saved.endpoint || ENDPOINTS.primary,
    apiKey:   saved.apiKey || "",
    messages: [],
  };

  const $ = (s,r=document) => r.querySelector(s);
  const el = (t,c,txt) => { const e=document.createElement(t); if(c) e.className=c; if(txt!=null) e.textContent=txt; return e; };
  const esc = s => String(s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
  const persona = () => PERSONAS.find(p=>p.id===state.persona) || PERSONAS[0];

  // ---------- markdown (fully local, no CDN needed) ----------
  function md(text){
    const raw = String(text ?? "");
    let h = esc(raw);
    // Code blocks
    h = h.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>');
    // Inline code
    h = h.replace(/`([^`]+)`/g,'<code>$1</code>');
    // Bold + italic
    h = h.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
    h = h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    h = h.replace(/\*(.+?)\*/g,'<em>$1</em>');
    // Images
    h = h.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img alt="$1" src="$2" style="max-width:100%">');
    // Links
    h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
    // Headers
    h = h.replace(/^#### (.+)$/gm,'<h4>$1</h4>');
    h = h.replace(/^### (.+)$/gm,'<h3>$1</h3>');
    h = h.replace(/^## (.+)$/gm,'<h2>$1</h2>');
    h = h.replace(/^# (.+)$/gm,'<h1>$1</h1>');
    // Blockquote
    h = h.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
    // Horizontal rule
    h = h.replace(/^---$/gm,'<hr>');
    // Lists
    h = h.replace(/^- (.+)$/gm,'<li>$1</li>');
    h = h.replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>');
    // Numbered lists
    h = h.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
    // Tables (simple)
    h = h.replace(/^\|(.+)\|$/gm, function(m){ var c=m.split('|').filter(Boolean).map(function(x){return x.trim()}); return '<tr>'+c.map(function(x){return /^[-:]+$/.test(x)?'<th>'+x+'</th>':'<td>'+x+'</td>'}).join('')+'</tr>'; });
    h = h.replace(/(<tr>[\s\S]*?<\/tr>)/g, function(m){ return m.includes('<th>') ? '<thead>'+m+'</thead>' : '<tbody>'+m+'</tbody>'; });
    // Paragraphs
    h = h.replace(/\n\n/g, '</p><p>');
    h = h.replace(/\n/g, '<br>');
    return '<p>'+h+'</p>';
  }

  // ---------- theme ----------
  const sun = '<circle cx="12" cy="12" r="4.2"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.6 4.6l1.8 1.8M17.6 17.6l1.8 1.8M19.4 4.6l-1.8 1.8M6.4 17.6l-1.8 1.8"/>';
  const moon = '<path d="M21 12.8A8.5 8.5 0 1 1 11.2 3 6.6 6.6 0 0 0 21 12.8z"/>';
  function applyTheme(){
    document.documentElement.dataset.theme = state.theme;
    $("#themeIcon").innerHTML = state.theme === "dark" ? sun : moon;
  }

  // ---------- render personas / modes ----------
  function renderPersonas(){
    const nav = $("#personas"); nav.innerHTML = "";
    PERSONAS.forEach(p => {
      const b = el("button","pchip"); b.style.setProperty("--phue", p.hue);
      b.setAttribute("aria-pressed", String(p.id===state.persona));
      b.innerHTML = `<span class="ico">${p.emoji}</span><span>${p.name}</span>`;
      b.onclick = () => { state.persona = p.id; save(); renderPersonas(); refreshEmpty(); refreshHint(); };
      nav.appendChild(b);
    });
  }
  function renderModes(){
    const wrap = $("#modes"); wrap.innerHTML = "";
    MODES.forEach(m => {
      const b = el("button","mode"); b.setAttribute("aria-pressed", String(m.id===state.mode));
      b.title = m.desc;
      b.innerHTML = `<span class="mdot"></span>${m.name}`;
      b.onclick = () => { state.mode = m.id; save(); renderModes(); refreshHint(); };
      wrap.appendChild(b);
    });
  }
  function refreshHint(){
    const p = persona(), m = MODES.find(x=>x.id===state.mode);
    $("#hint").innerHTML = `<span><b>${p.name}</b> · ${m.name}模式</span><span><kbd>Enter</kbd> 发送 · <kbd>Shift</kbd>+<kbd>Enter</kbd> 换行</span>`;
  }
  function refreshName(){
    const n = state.userName || "未登录";
    $("#nameLabel").textContent = n;
    $("#nameAv").textContent = (state.userName || "?").slice(0,1);
  }
  function isLoggedIn(){ return state.loggedIn; }

  // ---- Auth functions ----
  function showAuth(tab){
    tab = tab || "login";
    $("#authScrim").classList.add("open");
    $("#authLogin").style.display = tab === "login" ? "" : "none";
    $("#authRegister").style.display = tab === "register" ? "" : "none";
    $("#authScrim .auth-tab[data-tab=login]").classList.toggle("active", tab==="login");
    $("#authScrim .auth-tab[data-tab=register]").classList.toggle("active", tab==="register");
    $("#loginErr").style.display = "none";
    $("#regErr").style.display = "none";
    if (tab === "login") setTimeout(()=>$("#loginAccount").focus(), 80);
    else setTimeout(()=>$("#regName").focus(), 80);
  }
  function hideAuth(){ closeModal("authScrim"); }

  function doLogin(){
    const acc = $("#loginAccount").value.trim();
    const pw = $("#loginPassword").value;
    if (!acc){ showErr("loginErr", "请输入手机号或邮箱"); return; }
    if (!pw){ showErr("loginErr", "请输入密码"); return; }
    const users = loadUsers();
    const key = acc.toLowerCase();
    if (!users[key]){ showErr("loginErr", "账号不存在，请先注册"); return; }
    if (users[key].password !== pw){ showErr("loginErr", "密码错误"); return; }
    // Login success
    state.loggedIn = true;
    state.userName = users[key].name;
    state.account = acc;
    save(); hideAuth();
    refreshName(); refreshEmpty(); refreshHint();
    // Send welcome message to AI
    setTimeout(()=>{
      $("#input").value = "你好，我是"+state.userName+"，请根据我的需求帮我推荐合适的房子";
      send();
    }, 300);
  }

  function doRegister(){
    const name = $("#regName").value.trim();
    const acc = $("#regAccount").value.trim();
    const pw = $("#regPassword").value;
    const pw2 = $("#regPassword2").value;
    if (!name){ showErr("regErr", "请输入姓名"); return; }
    if (!acc){ showErr("regErr", "请输入手机号或邮箱"); return; }
    if (pw.length < 6){ showErr("regErr", "密码至少6位"); return; }
    if (pw !== pw2){ showErr("regErr", "两次密码不一致"); return; }
    const users = loadUsers();
    const key = acc.toLowerCase();
    if (users[key]){ showErr("regErr", "此账号已注册，请直接登录"); return; }
    // Register
    users[key] = { name, password: pw, createdAt: Date.now() };
    saveUsers(users);
    // Auto login
    state.loggedIn = true;
    state.userName = name;
    state.account = acc;
    save(); hideAuth();
    refreshName(); refreshEmpty(); refreshHint();
    // Send welcome message to AI
    setTimeout(()=>{
      $("#input").value = "你好，我是"+name+"，我想在鲅鱼圈买房，请先了解一下我的需求再给我推荐";
      send();
    }, 300);
  }

  function logout(){
    state.loggedIn = false;
    state.userName = "";
    state.account = "";
    state.messages = [];
    save();
    $("#stream").innerHTML = "";
    refreshName(); refreshEmpty();
    showAuth("login");
  }

  function showErr(id, msg){
    const el = $("#"+id);
    el.textContent = msg; el.style.display = "";
    setTimeout(()=>{ el.style.display = "none"; }, 3000);
  }

  // ---------- empty state ----------
  function refreshEmpty(){
    if (state.messages.length) return;
    const p = persona(); const stream = $("#stream"); stream.innerHTML = "";
    if (!isLoggedIn()){
      stream.innerHTML = `<div class="empty-wrap"><h1>请先<em>登录</em></h1><p class="sub">登录后即可使用 FindHome AI 智能房产顾问</p></div>`;
      return;
    }
    const wrap = el("div","empty-wrap"); wrap.style.setProperty("--phue", p.hue);
    const greet = state.userName ? `${esc(state.userName)}，` : "";
    wrap.innerHTML = `
      <div class="empty-badge"><span class="ico">${p.emoji}</span>${p.name} · ${esc(p.tagline)}</div>
      <h1>${greet}想在哪儿<em>安个家</em>？</h1>
      <p class="sub">把你的预算、城市和顾虑说给我听，我会一步步帮你把买房这件事想清楚。</p>
      <div class="samples"></div>`;
    const grid = $(".samples", wrap);
    const arrow = '<svg class="k" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7"/><path d="M8 7h9v9"/></svg>';
    p.samples.forEach(s => {
      const c = el("button","sample"); c.innerHTML = `${arrow}<span>${esc(s)}</span>`;
      c.onclick = () => { $("#input").value = s; autosize(); send(); };
      grid.appendChild(c);
    });
    stream.appendChild(wrap);
  }

  // ---------- message DOM ----------
  function addUser(text){
    const stream = $("#stream");
    const row = el("div","msg msg-user");
    row.innerHTML = `<div class="avatar">${(state.userName||"你").slice(0,1)}</div>
      <div class="col"><div class="bubble-user">${esc(text)}</div></div>`;
    stream.appendChild(row); scrollDown();
  }

  // returns a controller object for live updates
  function addAssistant(){
    const p = persona();
    const stream = $("#stream");
    const row = el("div","msg msg-assistant"); row.style.setProperty("--phue", p.hue);
    row.innerHTML = `<div class="avatar">${p.emoji}</div>
      <div class="col" style="max-width:100%;">
        <div class="bubble">
          <div class="trace" hidden>
            <button class="trace-head" type="button">
              <span class="spin">${spinSvg()}</span><span class="tlabeltxt">思考中</span>
              <span class="chev">${chevSvg()}</span>
            </button>
            <div class="trace-body"></div>
          </div>
          <div class="typing"><i></i><i></i><i></i></div>
          <div class="answer empty"></div>
        </div>
      </div>`;
    stream.appendChild(row); scrollDown();

    const trace = $(".trace", row);
    const traceBody = $(".trace-body", row);
    const traceHead = $(".trace-head", row);
    const traceLabel = $(".tlabeltxt", row);
    const traceSpin = $(".trace-head .spin", row);
    const typing = $(".typing", row);
    const answer = $(".answer", row);
    let lastTool = null, hasProcess = false, done = false;

    traceHead.onclick = () => trace.classList.toggle("collapsed");

    function showTrace(){ if(!hasProcess){ hasProcess = true; trace.hidden = false; } }
    function clearToolSpins(){ traceBody.querySelectorAll(".rstat .spin").forEach(s=>s.remove()); }

    return {
      thinking(txt){
        showTrace();
        let t = $(".think", traceBody);
        if(!t){ t = el("div","think"); traceBody.appendChild(t); }
        t.textContent = (t.textContent ? t.textContent + "\n" : "") + String(txt).trim();
        scrollDown();
      },
      toolCall(txt, meta){
        showTrace();
        const name = (meta && (meta.tool || meta.name)) ||
          (String(txt).match(/Calling[:：]?\s*([^\s（(]+)/i)?.[1]) || "工具";
        const tool = el("div","tool collapsed");
        tool.innerHTML = `<button class="tool-head" type="button">
            <span class="tname">${esc(name)}</span><span class="tlabel">${esc(shortenCall(txt))}</span>
            <span class="tstat"><span class="rstat"><span class="spin">${spinSvg(12)}</span></span><span class="chev">${chevSvg()}</span></span>
          </button><div class="tool-body"></div>`;
        $(".tool-head", tool).onclick = () => tool.classList.toggle("collapsed");
        traceBody.appendChild(tool);
        lastTool = { el: tool, body: $(".tool-body", tool), stat: $(".rstat", tool) };
        if (meta && Object.keys(meta).length){
          lastTool.body.textContent = safeMeta(meta);
        }
        scrollDown();
      },
      toolResult(txt){
        const t = lastTool;
        if (t){
          const prev = t.body.textContent ? t.body.textContent + "\n\n" : "";
          t.body.textContent = prev + String(txt).trim();
          t.stat.innerHTML = `<span class="dot-ok">${checkSvg()}</span>`;
        }
        scrollDown();
      },
      finalChunk(){ /* reserved for token streaming if backend adds it */ },
      complete(txt){
        if (done) return; done = true;
        typing.remove();
        clearToolSpins();
        traceSpin.classList.remove("spin");
        traceSpin.innerHTML = `<span class="dot-ok">${checkSvg(13)}</span>`;
        traceLabel.textContent = "思考过程";
        if (hasProcess) trace.classList.add("collapsed");
        answer.classList.remove("empty");
        answer.innerHTML = md(txt);
        answer.querySelectorAll("a").forEach(a=>{ a.target="_blank"; a.rel="noopener noreferrer"; });
        scrollDown();
      },
      error(msg){
        if (done) return; done = true;
        typing.remove();
        clearToolSpins();
        traceSpin.classList.remove("spin");
        traceSpin.innerHTML = "";
        const e = el("div","errline", msg); answer.replaceWith(e);
      },
      stop(){
        done = true;
        typing.remove();
        clearToolSpins();
        traceSpin.classList.remove("spin");
        traceSpin.innerHTML = "";
        if (answer.classList.contains("empty")){ answer.classList.remove("empty"); answer.textContent = "已停止生成"; }
      },
    };
  }

  // small svg helpers
  function spinSvg(s=13){ return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 3a9 9 0 1 0 9 9" opacity=".9"/></svg>`; }
  function chevSvg(){ return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>`; }
  function checkSvg(s=14){ return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>`; }
  function shortenCall(t){ const s=String(t).replace(/^Calling[:：]?\s*/i,"").trim(); return s.length>42 ? s.slice(0,42)+"…" : s; }
  function safeMeta(m){ try{ return JSON.stringify(m,null,2); }catch{ return String(m); } }

  function scrollDown(){ const th=$("#thread"); th.scrollTop = th.scrollHeight; }

  // ---------- SSE networking ----------
  let inFlight = null; // AbortController

  async function streamChat(message, ui){
    const order = state.endpointKey === "fallback"
      ? [ENDPOINTS.fallback, ENDPOINTS.primary]
      : [state.endpoint || ENDPOINTS.primary, ENDPOINTS.fallback];

    const body = JSON.stringify({ message, userName: state.userName || "访客", persona: state.persona, mode: state.mode });
    let lastErr = null;

    for (let i=0; i<order.length; i++){
      const url = order[i];
      inFlight = new AbortController();
      // Timeout after 45s
      const timer = setTimeout(()=>{ inFlight.abort(); }, 45000);
      const headers = { "Content-Type":"application/json", "Accept":"text/event-stream" };
      if (state.apiKey) headers["Authorization"] = "Bearer " + state.apiKey;
      try {
        const res = await fetch(url, { method:"POST", headers, body, signal: inFlight.signal });
        clearTimeout(timer);
        if (!res.ok){
          lastErr = `服务返回 ${res.status}`;
          continue;
        }
        if (!res.body){ lastErr = "无响应流"; continue; }
        await readSSE(res.body, ui);
        return true;
      } catch (err){
        clearTimeout(timer);
        if (err && err.name === "AbortError"){ ui.stop(); return false; }
        lastErr = "连接失败：" + (err && err.message ? err.message : err);
      }
    }
    ui.error(lastErr || "请求失败，请稍后再试。");
    return false;
  }

  async function readSSE(stream, ui){
    const reader = stream.getReader();
    const decoder = new TextDecoder();
    let buf = "";
    let got = false;
    while (true){
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream:true });
      buf = buf.replace(/\r\n/g, "\n");
      let sep;
      while ((sep = buf.indexOf("\n\n")) >= 0){
        const block = buf.slice(0, sep); buf = buf.slice(sep+2);
        const data = block.split("\n").filter(l=>l.startsWith("data:")).map(l=>l.slice(5).replace(/^ /,"")).join("\n");
        if (!data || data === "[DONE]") continue;
        let evt; try { evt = JSON.parse(data); } catch { continue; }
        got = true; dispatch(evt, ui);
      }
    }
    buf += decoder.decode(); buf = buf.replace(/\r\n/g, "\n"); // flush any trailing multi-byte (CJK) bytes
    // flush trailing block without double newline
    const tail = buf.split("\n").filter(l=>l.startsWith("data:")).map(l=>l.slice(5).replace(/^ /,"")).join("\n");
    if (tail && tail !== "[DONE]"){ try { dispatch(JSON.parse(tail), ui); got = true; } catch {} }
    if (!got) ui.error("收到空响应，请检查接口或稍后重试。");
  }

  function dispatch(evt, ui){
    const type = evt.type || evt.event;
    const data = evt.data != null ? evt.data : (evt.content != null ? evt.content : "");
    switch (type){
      case "thinking":    ui.thinking(data); break;
      case "tool_call":   ui.toolCall(data, evt.metadata); break;
      case "tool_result": ui.toolResult(data); break;
      case "complete":    if (!data){ ui.error("回复为空"); break; } ui.complete(data); state.messages.push({ role:"assistant" }); break;
      case "error":       ui.error(typeof data==="string"?data:"服务返回错误"); break;
      default: /* unknown event: ignore */ break;
    }
  }

  // ---------- send ----------
  let busy = false;
  function setBusy(b){
    busy = b;
    const btn = $("#sendBtn");
    if (b){
      btn.classList.add("stop"); btn.setAttribute("aria-label","停止");
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><rect x="7" y="7" width="10" height="10" rx="2.5"/></svg>`;
    } else {
      btn.classList.remove("stop"); btn.setAttribute("aria-label","发送");
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>`;
    }
  }

  async function send(){
    if (!isLoggedIn()){ showAuth("login"); return; }
    if (busy){ if (inFlight) inFlight.abort(); return; }
    const input = $("#input");
    const text = input.value.trim();
    if (!text) return;

    if (!state.messages.length) $("#stream").innerHTML = ""; // clear empty state
    state.messages.push({ role:"user", text });
    addUser(text);
    input.value = ""; autosize();

    const ui = addAssistant();
    setBusy(true);
    await streamChat(text, ui);
    setBusy(false);
    inFlight = null;
    input.focus();
  }

  // ---------- input behaviour ----------
  function autosize(){
    const t = $("#input"); t.style.height = "auto"; t.style.height = Math.min(t.scrollHeight, 168) + "px";
  }

  // ---------- modals ----------
  function openModal(id){ $("#"+id).classList.add("open"); }
  function closeModal(id){ $("#"+id).classList.remove("open"); }

  // ---------- wire up ----------
  function init(){
    applyTheme(); renderPersonas(); renderModes(); refreshHint(); refreshName(); refreshEmpty();

    if (!isLoggedIn()) showAuth("login");

    $("#themeBtn").onclick = () => { state.theme = state.theme==="dark"?"light":"dark"; save(); applyTheme(); };

    const input = $("#input");
    input.addEventListener("input", autosize);
    input.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey && !e.isComposing && e.keyCode !== 229){ e.preventDefault(); send(); }
    });
    $("#sendBtn").onclick = send;

    // auth modal / logout
    $("#nameBtn").onclick = () => {
      if (isLoggedIn()){
        if (confirm("确定退出登录吗？")) logout();
      } else {
        showAuth("login");
      }
    };
    $("#authScrim .auth-tab[data-tab=login]").onclick = () => showAuth("login");
    $("#authScrim .auth-tab[data-tab=register]").onclick = () => showAuth("register");
    $("#loginBtn").onclick = doLogin;
    $("#regBtn").onclick = doRegister;
    $("#loginAccount").addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });
    $("#loginPassword").addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });
    ["regName","regAccount","regPassword","regPassword2"].forEach(id=>{
      $("#"+id).addEventListener("keydown", e=>{ if(e.key==="Enter") doRegister(); });
    });

    // settings modal
    $("#settingsBtn").onclick = () => {
      $("#endpointInput").value = state.endpoint;
      $("#keyInput").value = state.apiKey;
      $("#endpointSeg").querySelectorAll("button").forEach(b=>b.setAttribute("aria-pressed", String(b.dataset.ep===state.endpointKey)));
      openModal("setScrim");
    };
    $("#endpointSeg").querySelectorAll("button").forEach(b => {
      b.onclick = () => {
        $("#endpointSeg").querySelectorAll("button").forEach(x=>x.setAttribute("aria-pressed","false"));
        b.setAttribute("aria-pressed","true");
        $("#endpointInput").value = ENDPOINTS[b.dataset.ep];
      };
    });
    $("#setSave").onclick = () => {
      const ep = $("#endpointInput").value.trim();
      state.endpoint = ep || ENDPOINTS.primary;
      state.endpointKey = ep === ENDPOINTS.fallback ? "fallback" : "primary";
      state.apiKey = $("#keyInput").value.trim();
      save(); closeModal("setScrim");
    };

    document.querySelectorAll("[data-close]").forEach(b => b.onclick = () => closeModal(b.dataset.close));
    document.querySelectorAll(".scrim").forEach(s => s.addEventListener("click", e => { if(e.target===s) closeModal(s.id); }));
    document.addEventListener("keydown", e => { if(e.key==="Escape") document.querySelectorAll(".scrim.open").forEach(s=>closeModal(s.id)); });

    // not logged in: show auth
    if (!isLoggedIn()){ setTimeout(()=>{ showAuth("login"); }, 300); }
  }

  init();
})();
</script>
